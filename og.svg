<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#063C2B"/>
      <stop offset="0.55" stop-color="#0B6E4F"/>
      <stop offset="1" stop-color="#0E8A63"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.12" r="0.6">
      <stop offset="0" stop-color="#F5B700" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#F5B700" stop-opacity="0"/>
    </radialGradient>
    <font-face font-family="Sans"/>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- decorative confetti dots -->
  <g fill="#F5B700" opacity="0.9">
    <circle cx="980" cy="90" r="6"/><circle cx="1080" cy="160" r="9"/>
    <circle cx="1130" cy="70" r="5"/><circle cx="920" cy="150" r="4"/>
  </g>
  <g fill="#ffffff" opacity="0.12">
    <circle cx="150" cy="540" r="120"/><circle cx="1120" cy="560" r="60"/>
  </g>

  <!-- big soccer ball on the right -->
  <g transform="translate(910 350) scale(2.7)">
    <circle r="95" fill="#ffffff" stroke="#063C2B" stroke-width="3" opacity="0.97"/>
    <polygon points="0,-31 30,-9.5 18,28 -18,28 -30,-9.5" fill="#13211B"/>
    <g stroke="#13211B" stroke-width="6" stroke-linecap="round">
      <line x1="0" y1="-31" x2="0" y2="-82"/>
      <line x1="30" y1="-9.5" x2="78" y2="-36"/>
      <line x1="18" y1="28" x2="49" y2="73"/>
      <line x1="-18" y1="28" x2="-49" y2="73"/>
      <line x1="-30" y1="-9.5" x2="-78" y2="-36"/>
    </g>
  </g>

  <!-- LEFT CONTENT -->
  <!-- pill -->
  <g transform="translate(80 92)">
    <rect width="260" height="48" rx="24" fill="#E5383B"/>
    <circle cx="34" cy="24" r="8" fill="#fff"/>
    <text x="58" y="32" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#fff" letter-spacing="1">TỶ SỐ TRỰC TIẾP</text>
  </g>

  <!-- trophy + title -->
  <text x="78" y="270" font-family="Arial, Helvetica, sans-serif" font-size="118" font-weight="800" fill="#ffffff" letter-spacing="-2">WORLD CUP</text>
  <text x="82" y="392" font-family="Arial, Helvetica, sans-serif" font-size="120" font-weight="800" fill="#F5B700" letter-spacing="2">2026 <tspan font-size="96">🏆</tspan></text>

  <!-- subtitle -->
  <text x="84" y="470" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#D9F2E7">Bảng tỷ số · Lịch đấu · Bảng xếp hạng</text>
  <text x="84" y="516" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="400" fill="#A7D7C4">Tự động cập nhật · giờ Việt Nam (GMT+7)</text>

  <!-- url -->
  <text x="84" y="588" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#ffffff" opacity="0.85">sondt.github.io/score_wc_2026</text>
</svg>
